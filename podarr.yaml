    io.podman.annotations.userns/podarr-prowlarr: keep-id
    io.podman.annotations.userns/podarr-radarr: keep-id
    io.podman.annotations.userns/podarr-sonarr: keep-id
  creationTimestamp: "2026-04-15T21:47:05Z"
  labels:
    app: podarr
  name: podarr
