apiVersion: v1
kind: Pod
metadata:
  annotations:
    bind-mount-options: /data/media:Z
    io.containers.autoupdate/myjellyfin: registry
    io.podman.annotations.kube.health.check/podarr-jellyfin: "true"
    io.podman.annotations.kube.health.check/podarr-prowlarr: "true"
    io.podman.annotations.kube.health.check/podarr-radarr: "true"
    io.podman.annotations.kube.health.check/podarr-sonarr: "true"
    io.podman.annotations.userns: keep-id
